name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt
        run: cargo fmt --check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: cargo test
        run: cargo test
      - name: cargo build
        run: cargo build
      - name: cargo build release
        run: cargo build --release -p etherfence-cli
      - name: package linux release artifact
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/etherfence-v${{ github.sha }}-linux-x86_64
          cp target/release/etherfence dist/etherfence-v${{ github.sha }}-linux-x86_64/
          tar -C dist -czf dist/etherfence-linux-x86_64.tar.gz etherfence-v${{ github.sha }}-linux-x86_64
      - name: package windows release artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/etherfence-v${{ github.sha }}-windows-x86_64 | Out-Null
          Copy-Item target/release/etherfence.exe dist/etherfence-v${{ github.sha }}-windows-x86_64/
          Compress-Archive -Path dist/etherfence-v${{ github.sha }}-windows-x86_64 -DestinationPath dist/etherfence-windows-x86_64.zip -Force
      - name: upload linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: etherfence-linux-x86_64
          path: dist/etherfence-linux-x86_64.tar.gz
      - name: upload windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: etherfence-windows-x86_64
          path: dist/etherfence-windows-x86_64.zip
