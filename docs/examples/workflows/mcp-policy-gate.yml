# Example GitHub Actions workflow: validate an `ef-mcp-policy/v0.1` file and
# dry-run-check example JSON-RPC requests against it in CI, with no MCP
# server started or contacted and no tool executed.
#
# This file is documentation, not an active workflow. Copy it into
# `.github/workflows/` in your own repository and point `--policy`/
# `--request` at your own files. See docs/mcp-policy-ux.md and docs/ci.md
# for the full command reference.
#
# Scope: `etherfence mcp-policy validate|explain|check` are local, serverless
# commands. This job never starts `etherfence mcp-proxy`, never spawns or
# contacts an MCP server, and never executes a tool.
name: etherfence-mcp-policy-gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  mcp-policy-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Build etherfence
        run: cargo build --release -p etherfence-cli

      # Fails the job with a clear parser error if the policy file is
      # malformed, uses an unsupported schema version, or contains
      # suspicious Unicode.
      - name: Validate MCP policy
        run: |
          ./target/release/etherfence mcp-policy validate \
            docs/examples/ci/mcp-policy.toml

      # Prints method/tool/path-rule posture and warns about risky or
      # confusing policy shapes (does not fail the job by itself).
      - name: Explain MCP policy
        run: |
          ./target/release/etherfence mcp-policy explain \
            docs/examples/ci/mcp-policy.toml

      # Dry-run one known-allowed and one known-denied JSON-RPC request so a
      # reviewer can see, in CI logs, exactly what the live proxy would do
      # with each request under this policy.
      - name: Dry-run allowed tool call
        run: |
          ./target/release/etherfence mcp-policy check \
            --policy docs/examples/ci/mcp-policy.toml \
            --request docs/examples/ci/requests/allowed-tool-call.json

      - name: Dry-run denied tool call
        run: |
          ./target/release/etherfence mcp-policy check \
            --policy docs/examples/ci/mcp-policy.toml \
            --request docs/examples/ci/requests/denied-tool-call.json
