schema_version = "ef-policy/v0.1"
name = "developer-laptop"
description = "Balanced scan-only posture policy for local AI coding agents on developer workstations. Tirith is recommended for terminal-command controls but not required by this policy."
require_tirith = false

[agents."Claude Code"]
allowed_mcp_servers = ["filesystem", "github", "context7"]

[agents."Cursor"]
allowed_mcp_servers = ["filesystem", "github"]

[agents."VS Code"]
allowed_mcp_servers = ["filesystem", "github"]

[agents."Windsurf"]
allowed_mcp_servers = ["filesystem", "github", "repo-context"]

[agents."Gemini CLI"]
allowed_mcp_servers = ["filesystem", "github", "search"]

[agents."Codex CLI"]
allowed_mcp_servers = ["filesystem", "github"]

[filesystem]
allowed_path_prefixes = ["/path/to/project", "/path/to/project/workspace"]
denied_paths = ["/", "/home/user", "/Users/example"]

[environment]
allowed_name_patterns = ["^GITHUB_", "^NODE_", "^NPM_", "^CARGO_", "^RUST_", "^PATH$"]
deny_secret_like_names = true
