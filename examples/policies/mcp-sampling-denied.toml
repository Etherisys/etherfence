# Example EtherFence MCP proxy policy: sampling denied in either MCP direction.
#
# In the MCP protocol, sampling/createMessage is normally a server→client
# request (the server asks the client to generate a message). EtherFence
# v0.3.1 inspects server→client request/notification objects before they
# reach the client, so this deny rule blocks server-initiated sampling as
# well as any unusual client→server sampling request. The proxy still logs
# only method metadata and top-level param key names — never prompt text or
# message bodies.
schema_version = "ef-mcp-policy/v0.1"
name = "mcp-client-sampling-denied"

[methods]
allow = [
  "tools/list",
  "tools/call",
  "resources/list",
  "resources/read",
  "prompts/list",
  "prompts/get",
  "completion/complete",
  "roots/list",
]
deny = ["sampling/createMessage"]

[tools]
allow = ["filesystem.read"]
deny = ["shell.run"]
