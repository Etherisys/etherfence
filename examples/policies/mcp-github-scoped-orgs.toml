schema_version = "ef-mcp-policy/v0.2"
name = "mcp-github-scoped-orgs"

# v1.5.0 example: allow a GitHub issue-creation tool, but constrain the call
# so it can only ever target one named organization and that organization's
# own repositories, even if the agent is mistaken or prompt-injected into
# supplying a different org/repo.
[tools]
allow = ["github.create_issue"]

[tools."github.create_issue".arguments]
require_keys = ["org", "repo"]

[tools."github.create_issue".arguments.fields.org]
type = "enum"
values = ["my-org"]

[tools."github.create_issue".arguments.fields.repo]
type = "string"
prefix = "my-org/"
