# Example EtherFence MCP proxy policy: resources denied.
# Allows tools and prompts but denies all resource access.
# Useful for servers that expose sensitive files via resources/*.
schema_version = "ef-mcp-policy/v0.1"
name = "mcp-resources-denied"

[methods]
allow = [
  "tools/list",
  "tools/call",
  "prompts/list",
  "prompts/get",
  "completion/complete",
  "roots/list",
]
deny = ["resources/list", "resources/read", "sampling/createMessage"]

[tools]
allow = ["github.list_repos", "github.get_repo"]
deny = ["shell.run"]
